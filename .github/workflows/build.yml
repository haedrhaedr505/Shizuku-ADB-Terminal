name: Build ADB Terminal

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Accept licenses
        run: yes | sdkmanager --licenses || true
        
      - name: Build shell module only
        run: |
          chmod +x gradlew
          ./gradlew :shell:assembleDebug --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ADB-Terminal-APK
          path: shell/build/outputs/apk/debug/*.apk
